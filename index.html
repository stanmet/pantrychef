дит — наклейка с датой надёжнее.", "en": "Mark the date you cooked or opened it. Memory fails — a dated label does not."}}, {"h": {"ru": "Что НЕ в холодильник", "en": "What not to refrigerate"}, "b": {"ru": "Картофель, лук, чеснок, помидоры, бананы и нерезаные тыквы лучше при комнатной — холод портит вкус и текстуру.", "en": "Potatoes, onions, garlic, tomatoes, bananas and whole squash do better at room temperature."}}, {"h": {"ru": "Этилен и соседство", "en": "Ethylene and neighbours"}, "b": {"ru": "Яблоки, бананы, авокадо выделяют этилен и ускоряют дозревание рядом. Храните их отдельно от зелени и ягод.", "en": "Apples, bananas and avocado give off ethylene and ripen neighbours. Keep them away from greens and berries."}}, {"h": {"ru": "Консервы после вскрытия", "en": "Cans once opened"}, "b": {"ru": "Из открытой консервной банки переложите содержимое в стекло или пластик — металл на воздухе портит вкус и продукт.", "en": "Move opened canned food into glass or plastic — metal exposed to air spoils taste and food."}}, {"h": {"ru": "Заморозка: что можно", "en": "Freezing: what works"}, "b": {"ru": "Мясо, рыба, хлеб, бульоны, овощи (бланшированные) морозятся хорошо. Делите на порции и удаляйте воздух.", "en": "Meat, fish, bread, stock, blanched vegetables freeze well. Portion them and remove air."}}, {"h": {"ru": "Заморозка: что нельзя", "en": "Freezing: what fails"}, "b": {"ru": "Яйца в скорлупе, салат, огурцы, целые помидоры, сливочные соусы расслаиваются или лопаются. Лучше не морозить.", "en": "Eggs in shell, lettuce, cucumber, whole tomatoes and cream sauces split or burst. Avoid freezing these."}}, {"h": {"ru": "Сроки в морозилке", "en": "Freezer times"}, "b": {"ru": "Фарш 3–4 мес, мясо куском 6–12 мес, рыба 3–6 мес, хлеб 3 мес, готовые блюда 2–3 мес. Дальше — безопасно, но хуже на вкус.", "en": "Ground meat 3–4 mo, whole cuts 6–12 mo, fish 3–6 mo, bread 3 mo, cooked dishes 2–3 mo. Safe after, but lower quality."}}]], ["cook", "thermometer", {"ru": "Готовка и температуры", "en": "Cooking and temperatures"}, [{"h": {"ru": "Зачем температура", "en": "Why temperature"}, "b": {"ru": "Доготовка до нужной внутренней температуры убивает опасные бактерии. Цвет и сок — ненадёжный признак.", "en": "Cooking to the right internal temperature kills harmful bacteria. Colour and juices are unreliable."}}, {"h": {"ru": "Таблица температур", "en": "Temperature table"}, "b": {"ru": "Птица — 75 °C<br>Свинина — 75 °C<br>Фарш, колбаски — 75 °C<br>Говядина/баранина куском — 63 °C<br>Рыба — 63 °C<br>Разогрев — 75 °C<br>Эквивалент 75 °C/30 с: 70 °C 2 мин · 65 °C 10 мин", "en": "Poultry 75°C<br>Pork 75°C<br>Mince & sausages 75°C<br>Whole beef/lamb 63°C<br>Fish 63°C<br>Reheating 75°C<br>75°C/30s ≡ 70°C 2 min · 65°C 10 min"}}, {"h": {"ru": "Птица — 75 °C", "en": "Poultry — 75°C"}, "b": {"ru": "Курица, индейка, утка — до 75 °C, без розового сока у кости. Птица часто несёт сальмонеллу и кампилобактер.", "en": "Chicken, turkey, duck to 75°C, no pink juices near the bone. Poultry often carries salmonella and campylobacter."}}, {"h": {"ru": "Фарш — 75 °C", "en": "Mince — 75°C"}, "b": {"ru": "В фарше бактерии с поверхности перемешаны внутрь, поэтому он опаснее куска. Прожаривайте насквозь до 75 °C (или 70 °C 2 мин).", "en": "Grinding mixes surface bacteria throughout, so mince is riskier than a steak. Cook through to 75°C (or 70°C for 2 min)."}}, {"h": {"ru": "Говядина/баранина куском — 63 °C", "en": "Whole beef/lamb — 63°C"}, "b": {"ru": "Стейки и куски говядины/баранины можно с розовым: бактерии только на поверхности — обжарьте её. 63 °C внутри — средняя прожарка, дайте отдохнуть 3 мин. Свинину так нельзя — готовьте насквозь до 75 °C.", "en": "Whole beef and lamb can be pink: bacteria sit only on the surface, so sear it. 63°C inside is medium; rest 3 min. Pork is different — cook it through to 75°C."}}, {"h": {"ru": "Рыба и морепродукты", "en": "Fish and seafood"}, "b": {"ru": "Рыба — 63 °C, мякоть легко расслаивается. Креветки и моллюски — до плотности и непрозрачности; раковины должны раскрыться.", "en": "Fish 63°C and flakes easily. Shrimp and shellfish until firm and opaque; shells should open."}}, {"h": {"ru": "Яйца", "en": "Eggs"}, "b": {"ru": "Готовьте до плотного белка и желтка; блюда с яйцом — до 70 °C. Для сырых/полусырых берите пастеризованные яйца.", "en": "Cook until white and yolk are firm; egg dishes to 70°C. Use pasteurised eggs for raw or runny recipes."}}, {"h": {"ru": "Как мерить термометром", "en": "How to probe"}, "b": {"ru": "Вставляйте щуп в самую толстую часть, не касаясь кости и дна посуды. У тонких кусков — сбоку.", "en": "Insert the probe into the thickest part, away from bone and the pan. For thin cuts, go in from the side."}}, {"h": {"ru": "Опасная зона 5–63 °C", "en": "Danger zone 5–63°C"}, "b": {"ru": "В этом диапазоне бактерии размножаются быстро. Не держите еду в нём дольше 2 часов; при +30 °C и выше — не дольше часа.", "en": "Bacteria multiply fast here. Do not leave food in this range over 2 hours; over 30°C, no more than 1 hour."}}, {"h": {"ru": "Разогрев — один раз", "en": "Reheat once"}, "b": {"ru": "Разогревайте до 75 °C по всей толще и только один раз. Повторные циклы «нагрел-остудил» повышают риск.", "en": "Reheat to 75°C throughout and only once. Repeated heat-cool cycles raise the risk."}}, {"h": {"ru": "Рис и паста", "en": "Rice and pasta"}, "b": {"ru": "В варёном рисе выживают споры Bacillus cereus. Быстро охладите (за час) и храните в холоде; не держите тёплым часами.", "en": "Cooked rice can harbour Bacillus cereus spores. Cool fast (within an hour) and refrigerate; do not keep it warm for hours."}}, {"h": {"ru": "Готовка из заморозки", "en": "Cooking from frozen"}, "b": {"ru": "Мелкие куски и овощи можно готовить из заморозки (дольше на ~50%). Крупную птицу и фарш лучше сначала разморозить.", "en": "Small cuts and vegetables can be cooked from frozen (about 50% longer). Thaw large poultry and mince first."}}]], ["defrost", "snowflake", {"ru": "Разморозка", "en": "Defrosting"}, [{"h": {"ru": "Три безопасных способа", "en": "Three safe ways"}, "b": {"ru": "В холодильнике (лучше всего), в холодной воде или в микроволновке. Все три держат продукт вне опасной зоны.", "en": "In the fridge (best), in cold water, or in the microwave. All three keep food out of the danger zone."}}, {"h": {"ru": "Не при комнатной", "en": "Not on the counter"}, "b": {"ru": "Не размораживайте на столе: внешний слой нагревается в опасную зону, пока центр ещё лёд.", "en": "Do not thaw on the counter: the outside warms into the danger zone while the centre is still frozen."}}, {"h": {"ru": "В холодильнике", "en": "In the fridge"}, "b": {"ru": "Самый безопасный способ. Примерно сутки на 2 кг. Ставьте на нижнюю полку в поддон, чтобы сок не капал.", "en": "Safest method. About a day per 2 kg. Put it on the bottom shelf in a tray so juices do not drip."}}, {"h": {"ru": "В холодной воде", "en": "In cold water"}, "b": {"ru": "В герметичном пакете, под холодной водой, меняйте воду каждые 30 минут. Около часа на 0,5 кг. Сразу готовьте.", "en": "In a sealed bag under cold water, changed every 30 minutes. About an hour per 0.5 kg. Cook right away."}}, {"h": {"ru": "В микроволновке", "en": "In the microwave"}, "b": {"ru": "Режим разморозки греет неравномерно — края могут начать готовиться. Поэтому готовьте сразу после.", "en": "The defrost setting heats unevenly and edges may start cooking, so cook immediately afterwards."}}, {"h": {"ru": "Без повторной заморозки", "en": "No refreezing"}, "b": {"ru": "Размороженное сырое не замораживайте снова. Но можно заморозить уже после того, как приготовили.", "en": "Do not refreeze raw food once thawed. You can freeze it after cooking, though."}}, {"h": {"ru": "Планируйте заранее", "en": "Plan ahead"}, "b": {"ru": "Доставайте из морозилки накануне вечером. Крупная птица может оттаивать в холодильнике 1–2 суток.", "en": "Move items down the night before. A large bird can take 1–2 days to thaw in the fridge."}}, {"h": {"ru": "Размороженное — быстро", "en": "Use thawed food promptly"}, "b": {"ru": "Размороженное в холодильнике мясо/рыбу используйте за 1–2 дня. После холодной воды или микроволновки — сразу.", "en": "Use fridge-thawed meat or fish within 1–2 days. After cold water or microwave, cook it straight away."}}]], ["hygiene", "shield", {"ru": "Гигиена и уборка", "en": "Hygiene and cleaning"}, [{"h": {"ru": "Мойте руки 20 секунд", "en": "Wash hands 20 seconds"}, "b": {"ru": "С мылом, тщательно, включая между пальцами и под ногтями. 20 секунд — дольше, чем кажется.", "en": "With soap, thoroughly, including between fingers and under nails. 20 seconds is longer than it feels."}}, {"h": {"ru": "Когда мыть руки", "en": "When to wash"}, "b": {"ru": "До готовки; после сырого мяса/рыбы/яиц; после туалета, мусора, телефона, носа, животных; между разными продуктами.", "en": "Before cooking; after raw meat/fish/eggs; after the toilet, bin, phone, nose, pets; between different foods."}}, {"h": {"ru": "Доски и ножи раздельно", "en": "Separate boards and knives"}, "b": {"ru": "Отдельная доска и нож для сырого мяса и для готового/овощей. Мойте горячей водой с моющим сразу после сырого.", "en": "Separate board and knife for raw meat and for ready food/veg. Wash in hot soapy water right after raw."}}, {"h": {"ru": "Цветовое кодирование", "en": "Colour coding"}, "b": {"ru": "Удобно по цветам досок: красная — сырое мясо, синяя — рыба, зелёная — овощи, жёлтая — птица, белая — готовое.", "en": "Colour-coded boards help: red raw meat, blue fish, green veg, yellow poultry, white ready-to-eat."}}, {"h": {"ru": "Мытьё и дезинфекция", "en": "Cleaning vs sanitising"}, "b": {"ru": "Мытьё убирает грязь, дезинфекция убивает микробы. После сырого мяса делайте оба: сначала вымойте, затем продезинфицируйте.", "en": "Cleaning removes dirt; sanitising kills microbes. After raw meat do both: wash first, then sanitise."}}, {"h": {"ru": "Губки и тряпки", "en": "Sponges and cloths"}, "b": {"ru": "Губка — главный рассадник бактерий. Меняйте часто; дезинфицируйте, прогревая влажную в микроволновке или кипятком.", "en": "The sponge is a top bacteria reservoir. Replace it often; sanitise by heating it damp in the microwave or with boiling water."}}, {"h": {"ru": "Полотенца раздельно", "en": "Separate towels"}, "b": {"ru": "Разные полотенца для рук и для посуды, меняйте регулярно. Влажная ткань — дом для микробов.", "en": "Different towels for hands and dishes, changed regularly. A damp cloth is a home for microbes."}}, {"h": {"ru": "Чистка холодильника", "en": "Clean the fridge"}, "b": {"ru": "Разливы вытирайте сразу, полки мойте раз в неделю-две. Раз в месяц — генеральная, с проверкой сроков.", "en": "Wipe spills immediately, wash shelves every week or two. Do a monthly deep clean and check dates."}}, {"h": {"ru": "Ногти, украшения, раны", "en": "Nails, jewellery, cuts"}, "b": {"ru": "Короткие ногти, без колец во время готовки. Порез закройте водостойким пластырём и наденьте перчатку.", "en": "Short nails, no rings while cooking. Cover a cut with a waterproof plaster and wear a glove."}}, {"h": {"ru": "Болеете — не готовьте другим", "en": "Ill? Do not cook for others"}, "b": {"ru": "При рвоте или диарее не готовьте для других и 48 часов после симптомов — норовирус крайне заразен.", "en": "With vomiting or diarrhoea, do not cook for others until 48 hours after symptoms — norovirus spreads easily."}}]], ["shelf", "calendar", {"ru": "Сроки и порча", "en": "Shelf life and spoilage"}, [{"h": {"ru": "Признаки порчи", "en": "Signs of spoilage"}, "b": {"ru": "Неприятный запах, слизь, изменение цвета, плесень, вздутая упаковка — выбрасывайте. Не пробуйте на вкус.", "en": "Off smell, slime, colour change, mould, a bloated pack — throw it out. Never taste to check."}}, {"h": {"ru": "«Use by» и «Best before»", "en": "Use by vs best before"}, "b": {"ru": "«Use by» (годен до) — о безопасности, после нельзя есть. «Best before» — о качестве, после часто ещё съедобно.", "en": "Use by is about safety — do not eat after. Best before is about quality — often still fine after."}}, {"h": {"ru": "Ориентиры сроков", "en": "Typical shelf life"}, "b": {"ru": "Фарш/рыба 1–2 дня, мясо куском 3–5 дней, птица 1–2 дня, готовое 3–4 дня, яйца 3–5 недель (холодильник).", "en": "Mince/fish 1–2 days, whole cuts 3–5 days, poultry 1–2 days, cooked food 3–4 days, eggs 3–5 weeks (fridge)."}}, {"h": {"ru": "После вскрытия", "en": "Once opened"}, "b": {"ru": "После вскрытия срок резко короче. Смотрите на упаковке «после открытия употребить за N дней» и подписывайте дату.", "en": "Once opened the time drops sharply. Check the on-pack use within N days and label the date."}}, {"h": {"ru": "Остатки", "en": "Leftovers"}, "b": {"ru": "Готовые остатки — 3–4 дня в холоде. Нужно дольше — заморозьте. Перед едой разогрейте до 75 °C.", "en": "Cooked leftovers keep 3–4 days chilled. For longer, freeze them. Reheat to 75°C before eating."}}, {"h": {"ru": "Запах не гарантия", "en": "Smell is not proof"}, "b": {"ru": "Многие опасные бактерии не меняют запах, вид и вкус. Свежесть «на нюх» — ненадёжно.", "en": "Many dangerous bacteria do not change smell, look or taste. Judging freshness by nose is unreliable."}}, {"h": {"ru": "Плесень", "en": "Mould"}, "b": {"ru": "На мягком, влажном, готовом — выбрасывайте целиком (нити уходят вглубь). На твёрдом сыре можно срезать 2–3 см.", "en": "On soft, moist or cooked food, discard it all (threads run deep). On hard cheese, cut off 2–3 cm."}}, {"h": {"ru": "Заморозка не стерилизует", "en": "Freezing is not sterilising"}, "b": {"ru": "Холод останавливает рост бактерий, но не убивает их. После разморозки отсчёт срока продолжается.", "en": "Cold halts bacterial growth but does not kill them. After thawing, the clock keeps ticking."}}, {"h": {"ru": "Сомневаешься — выброси", "en": "When in doubt, throw out"}, "b": {"ru": "Стоимость продукта несравнима с отравлением. Если сомневаетесь в свежести — не рискуйте.", "en": "The cost of food is nothing next to food poisoning. If unsure about freshness, do not risk it."}}, {"h": {"ru": "Вздутые консервы", "en": "Bulging cans"}, "b": {"ru": "Вздутую, ржавую или подтекающую банку не вскрывайте и не пробуйте — риск ботулизма. Выбросьте.", "en": "Do not open or taste a bulging, rusty or leaking can — botulism risk. Throw it away."}}]], ["cross", "alert", {"ru": "Кросс-контаминация", "en": "Cross-contamination"}, [{"h": {"ru": "Что это такое", "en": "What it is"}, "b": {"ru": "Перенос бактерий с сырого на готовое — через руки, доски, ножи, тару, полотенца. Частая причина отравлений.", "en": "Transfer of bacteria from raw to ready-to-eat food via hands, boards, knives, containers, cloths. A common cause of poisoning."}}, {"h": {"ru": "Разделяйте сырое", "en": "Keep raw separate"}, "b": {"ru": "Сырое мясо и рыбу держите отдельно при покупке, в холодильнике и на столе.", "en": "Keep raw meat and fish apart when shopping, in the fridge, and on the counter."}}, {"h": {"ru": "Порядок в холодильнике", "en": "Order in the fridge"}, "b": {"ru": "Готовое — на верхние полки, сырое мясо и рыбу — на нижнюю, чтобы сок не капал на еду ниже.", "en": "Ready-to-eat on top shelves, raw meat and fish on the bottom, so juices do not drip onto food below."}}, {"h": {"ru": "Правильный порядок готовки", "en": "Right prep order"}, "b": {"ru": "Сначала режьте и готовьте овощи и готовое, сырое мясо — в последнюю очередь. Иначе мойте доску и нож между.", "en": "Cut and cook vegetables and ready food first, raw meat last. Otherwise wash the board and knife in between."}}, {"h": {"ru": "Маринад", "en": "Marinade"}, "b": {"ru": "Не поливайте готовое блюдо маринадом из-под сырого мяса. Нужен соус — отлейте часть заранее или прокипятите.", "en": "Do not baste cooked food with marinade from raw meat. Set some aside beforehand or boil it first."}}, {"h": {"ru": "Покупки", "en": "Shopping"}, "b": {"ru": "В тележке и пакете сырое мясо — отдельно от готового и овощей. Охлаждённое домой везите быстро, в сумке-холодильнике.", "en": "In the trolley and bag, keep raw meat away from ready food and produce. Get chilled items home fast, in a cool bag."}}, {"h": {"ru": "Полотенце и губка", "en": "Cloth and sponge"}, "b": {"ru": "Тряпка, которой вытерли сок сырого мяса, разносит бактерии по всей кухне. Сразу в стирку, берите чистую.", "en": "A cloth used on raw-meat juices spreads bacteria across the kitchen. Bin it for washing and take a clean one."}}, {"h": {"ru": "Готовое не на «сырую» доску", "en": "No cooked food on raw board"}, "b": {"ru": "Никогда не кладите готовое мясо на доску или тарелку, где лежало сырое, без мытья.", "en": "Never put cooked meat back on a board or plate that held it raw without washing first."}}, {"h": {"ru": "Аллергены — тоже контакт", "en": "Allergens transfer too"}, "b": {"ru": "Следы аллергена переносятся так же, как бактерии. Для аллергика — отдельные приборы и чистые поверхности.", "en": "Allergen traces transfer like bacteria. For an allergic person, use separate utensils and clean surfaces."}}]], ["allergens", "leaf", {"ru": "Аллергены", "en": "Allergens"}, [{"h": {"ru": "Что такое пищевая аллергия", "en": "What a food allergy is"}, "b": {"ru": "Иммунная реакция на белок пищи. Бывает лёгкой (сыпь, зуд) и тяжёлой, вплоть до анафилаксии, опасной для жизни.", "en": "An immune reaction to a food protein. It ranges from mild (rash, itch) to severe anaphylaxis, which is life-threatening."}}, {"h": {"ru": "14 аллергенов ЕС", "en": "The 14 EU allergens"}, "b": {"ru": "Злаки с глютеном, ракообразные, яйца, рыба, арахис, соя, молоко, орехи, сельдерей, горчица, кунжут, сульфиты, люпин, моллюски.", "en": "Cereals with gluten, crustaceans, eggs, fish, peanuts, soy, milk, tree nuts, celery, mustard, sesame, sulphites, lupin, molluscs."}}, {"h": {"ru": "Аллергия и непереносимость", "en": "Allergy vs intolerance"}, "b": {"ru": "Аллергия — иммунная и может быть опасной. Непереносимость (например, лактозы) — про пищеварение и не угрожает жизни.", "en": "An allergy is immune and can be dangerous. An intolerance (e.g. lactose) is digestive and not life-threatening."}}, {"h": {"ru": "Глютен", "en": "Gluten"}, "b": {"ru": "Пшеница, рожь, ячмень, часто овёс. Прячется в соусах, колбасах, панировке, соевом соусе, пиве.", "en": "Wheat, rye, barley, often oats. Hides in sauces, sausages, breading, soy sauce, beer."}}, {"h": {"ru": "Молоко", "en": "Milk"}, "b": {"ru": "Не только явное молоко: масло, сыр, сливки, сыворотка, казеин, многие готовые блюда и выпечка.", "en": "Not just obvious milk: butter, cheese, cream, whey, casein, and many ready meals and baked goods."}}, {"h": {"ru": "Яйца", "en": "Eggs"}, "b": {"ru": "Кроме яиц как таковых — майонез, выпечка, паста, глазурь, некоторые соусы и панировки.", "en": "Beyond eggs themselves — mayonnaise, baked goods, pasta, glazes, some sauces and coatings."}}, {"h": {"ru": "Орехи и арахис", "en": "Tree nuts and peanuts"}, "b": {"ru": "Это разные аллергены: арахис — бобовое. Оба часты и опасны, прячутся в соусах (песто, сатай), десертах, маслах.", "en": "These are different allergens: peanut is a legume. Both are common and serious, hiding in sauces (pesto, satay), desserts, oils."}}, {"h": {"ru": "Рыба и морепродукты", "en": "Fish and shellfish"}, "b": {"ru": "Рыба, ракообразные (креветки, крабы) и моллюски — три отдельных аллергена. Осторожно с рыбным соусом и бульонами.", "en": "Fish, crustaceans (shrimp, crab) and molluscs are three separate allergens. Watch fish sauce and stocks."}}, {"h": {"ru": "Следовые количества", "en": "Trace amounts"}, "b": {"ru": "У чувствительных людей реакцию вызывают даже следы. Поэтому есть пометка «может содержать следы…».", "en": "In sensitive people even traces trigger a reaction. That is why labels say may contain traces of."}}, {"h": {"ru": "Читайте этикетки", "en": "Read labels"}, "b": {"ru": "В составе аллергены по закону выделены жирным. Состав меняется — проверяйте каждую покупку, не по памяти.", "en": "By law allergens are highlighted in bold in the ingredients. Recipes change — check every purchase, not from memory."}}, {"h": {"ru": "Если готовите аллергику", "en": "Cooking for an allergic guest"}, "b": {"ru": "Спросите про аллергены заранее. Отдельные доски и приборы, чистые поверхности, свежее масло — следы переносятся.", "en": "Ask about allergens in advance. Use separate boards and utensils, clean surfaces, fresh oil — traces transfer."}}, {"h": {"ru": "Симптомы реакции", "en": "Reaction symptoms"}, "b": {"ru": "Сыпь, зуд, отёк губ/лица, тошнота. Тяжёлые: отёк горла, свист, затруднённое дыхание, головокружение — это экстренно.", "en": "Rash, itching, swollen lips/face, nausea. Severe: throat swelling, wheezing, trouble breathing, dizziness — that is an emergency."}}, {"h": {"ru": "Анафилаксия", "en": "Anaphylaxis"}, "b": {"ru": "При тяжёлой реакции — адреналин (автоинъектор, если назначен) и немедленно звонить в скорую (112/103).", "en": "For a severe reaction use adrenaline (an auto-injector if prescribed) and call emergency services immediately (112)."}}]], ["risk", "heart", {"ru": "Группы риска", "en": "Higher-risk groups"}, [{"h": {"ru": "Кто в группе риска", "en": "Who is at higher risk"}, "b": {"ru": "Беременные, дети до 5 лет, люди 65+ и с ослабленным иммунитетом. У них отравление протекает тяжелее.", "en": "Pregnant people, children under 5, those 65+ and people with weak immunity. Food poisoning hits them harder."}}, {"h": {"ru": "Почему строже", "en": "Why be stricter"}, "b": {"ru": "У этих групп слабее защита, и обычная инфекция может дать тяжёлые осложнения. Стоит избегать рискованных продуктов.", "en": "Their defences are weaker and a routine infection can cause serious complications. Avoid higher-risk foods."}}, {"h": {"ru": "Беременность: чего избегать", "en": "Pregnancy: what to avoid"}, "b": {"ru": "Непастеризованное молоко и мягкие сыры, сырое/полусырое мясо, рыбу и яйца, паштеты, сырокопчёное — риск листерии и сальмонеллы.", "en": "Unpasteurised milk and soft cheese, raw/undercooked meat, fish and eggs, pâté, cured raw meats — listeria and salmonella risk."}}, {"h": {"ru": "Листерия", "en": "Listeria"}, "b": {"ru": "Растёт даже в холодильнике и особенно опасна при беременности. Готовые к употреблению продукты ешьте свежими, разогревайте до горяча.", "en": "Listeria grows even in the fridge and is especially dangerous in pregnancy. Eat ready-to-eat foods fresh and reheat until piping hot."}}, {"h": {"ru": "Дети до года: мёд", "en": "Babies: no honey"}, "b": {"ru": "Не давайте мёд детям до 1 года — риск детского ботулизма. Это правило именно про первый год жизни.", "en": "Do not give honey to babies under 1 — risk of infant botulism. This rule is specifically for the first year."}}, {"h": {"ru": "Дети: ещё", "en": "Children: also"}, "b": {"ru": "Детям избегайте сырых и полусырых яиц, непастеризованного молока/сока, недожаренного мяса. Готовьте тщательнее.", "en": "For children avoid raw or runny eggs, unpasteurised milk/juice, undercooked meat. Cook more thoroughly."}}, {"h": {"ru": "Сальмонелла и яйца", "en": "Salmonella and eggs"}, "b": {"ru": "Для групп риска — только хорошо проготовленные яйца или пастеризованные. Без жидкого желтка в рискованных рецептах.", "en": "For higher-risk groups, use well-cooked or pasteurised eggs only. No runny yolk in risky recipes."}}, {"h": {"ru": "Пожилые и иммунодефицит", "en": "Older adults and low immunity"}, "b": {"ru": "Соблюдайте температуры и сроки строже, ешьте свежее, избегайте сырого. При химиотерапии — спросите врача о диете.", "en": "Follow temperatures and dates strictly, eat fresh, avoid raw foods. On chemotherapy, ask a doctor about diet."}}, {"h": {"ru": "Это общие сведения", "en": "General information"}, "b": {"ru": "Это справочная информация, а не медицинская рекомендация. По питанию в беременность или при болезни советуйтесь с врачом.", "en": "This is general information, not medical advice. For diet in pregnancy or illness, consult a doctor."}}]], ["poisoning", "pulse", {"ru": "Отравления и симптомы", "en": "Food poisoning and symptoms"}, [{"h": {"ru": "Что это", "en": "What it is"}, "b": {"ru": "Болезнь от заражённой пищи — бактерии, вирусы или их токсины. Чаще из-за недоготовки, плохого хранения и кросс-контаминации.", "en": "Illness from contaminated food — bacteria, viruses or their toxins. Often from undercooking, poor storage and cross-contamination."}}, {"h": {"ru": "Частые возбудители", "en": "Common causes"}, "b": {"ru": "Сальмонелла, кампилобактер, кишечная палочка (E. coli), листерия, норовирус, Bacillus cereus, стафилококк.", "en": "Salmonella, campylobacter, E. coli, listeria, norovirus, Bacillus cereus, staphylococcus."}}, {"h": {"ru": "Типичные симптомы", "en": "Typical symptoms"}, "b": {"ru": "Тошнота, рвота, диарея, спазмы в животе, иногда температура. Обычно проходит за 1–3 дня.", "en": "Nausea, vomiting, diarrhoea, stomach cramps, sometimes fever. Usually passes in 1–3 days."}}, {"h": {"ru": "Когда к врачу", "en": "When to see a doctor"}, "b": {"ru": "Кровь в стуле, температура выше 39 °C, признаки обезвоживания, симптомы дольше 3 дней, либо группа риска — обратитесь за помощью.", "en": "Blood in stool, fever over 39°C, signs of dehydration, symptoms beyond 3 days, or a higher-risk person — seek care."}}, {"h": {"ru": "Обезвоживание", "en": "Dehydration"}, "b": {"ru": "Главная опасность — потеря жидкости. Пейте понемногу воду или растворы для регидратации. У детей следите за мочеиспусканием и вялостью.", "en": "The main danger is fluid loss. Sip water or rehydration solutions. In children, watch urination and lethargy."}}, {"h": {"ru": "Сальмонелла", "en": "Salmonella"}, "b": {"ru": "Из яиц, птицы, недоготовленного мяса. Симптомы через 6 часов – 6 дней: диарея, температура, спазмы.", "en": "From eggs, poultry, undercooked meat. Symptoms in 6 hours to 6 days: diarrhoea, fever, cramps."}}, {"h": {"ru": "Кампилобактер", "en": "Campylobacter"}, "b": {"ru": "Одна из самых частых причин. Источник — сырая и недожаренная птица. Тщательно готовьте курицу и не мойте её.", "en": "One of the most common causes. Source is raw and undercooked poultry. Cook chicken thoroughly and do not wash it."}}, {"h": {"ru": "E. coli и листерия", "en": "E. coli and listeria"}, "b": {"ru": "E. coli — из недожаренного фарша и немытых овощей, бывает тяжёлой. Листерия — из готовых охлаждённых продуктов, опасна при беременности.", "en": "E. coli from undercooked mince and unwashed produce can be severe. Listeria from chilled ready foods is dangerous in pregnancy."}}, {"h": {"ru": "Bacillus cereus (рис)", "en": "Bacillus cereus (rice)"}, "b": {"ru": "«Синдром разогретого риса»: варёный рис долго стоял тёплым. Быстро охлаждайте рис и пасту, не держите в тепле.", "en": "The reheated-rice syndrome: cooked rice left warm too long. Cool rice and pasta fast, do not keep them warm."}}, {"h": {"ru": "Стафилококк", "en": "Staphylococcus"}, "b": {"ru": "Попадает с рук через ранки в готовую еду; даёт токсин. Быстрое начало — 1–6 часов, сильная рвота. Гигиена рук решает.", "en": "Gets into ready food from hands via cuts and makes a toxin. Fast onset 1–6 hours, strong vomiting. Hand hygiene is key."}}, {"h": {"ru": "Четыре правила профилактики", "en": "Four prevention rules"}, "b": {"ru": "Чистота · Разделяй сырое и готовое · Готовь до нужной температуры · Охлаждай быстро. Это основа защиты (ВОЗ).", "en": "Clean · Separate raw and cooked · Cook to temperature · Chill promptly. The core of protection (WHO)."}}, {"h": {"ru": "Это не диагноз", "en": "Not a diagnosis"}, "b": {"ru": "Информация справочная. При тяжёлых, кровавых или затяжных симптомах, у детей и беременных — к врачу, не занимайтесь самолечением.", "en": "This is general information. For severe, bloody or prolonged symptoms, in children or pregnancy, see a doctor; do not self-treat."}}]], ["equipment", "wrench", {"ru": "Инвентарь и термометры", "en": "Tools and thermometers"}, [{"h": {"ru": "Пищевой термометр", "en": "A food thermometer"}, "b": {"ru": "Главный прибор безопасности. Щуповой моментальный термометр точнее всего показывает готовность мяса и рыбы.", "en": "The key safety tool. An instant-read probe thermometer is the most reliable way to judge meat and fish."}}, {"h": {"ru": "Калибровка термометра", "en": "Calibrate it"}, "b": {"ru": "Проверка по льду: в стакане ледяной воды должно быть 0 °C. По кипятку — около 100 °C (ниже в горах).", "en": "Ice check: a glass of iced water should read 0°C. Boiling water reads about 100°C (lower at altitude)."}}, {"h": {"ru": "Куда вставлять щуп", "en": "Where to probe"}, "b": {"ru": "В самую толстую часть, не касаясь кости, жира и дна посуды. Тонкие куски — сбоку.", "en": "Into the thickest part, away from bone, fat and the pan. For thin cuts, insert from the side."}}, {"h": {"ru": "Доски: пластик и дерево", "en": "Boards: plastic and wood"}, "b": {"ru": "Пластик можно в посудомойку и удобно кодировать цветом. Дерево — заводите отдельную для сырого. Глубокие порезы — меняйте доску.", "en": "Plastic is dishwasher-safe and easy to colour-code. With wood, keep one just for raw. Replace boards with deep cuts."}}, {"h": {"ru": "Ножи", "en": "Knives"}, "b": {"ru": "Чистите сразу после сырого, не оставляйте в раковине. Острый нож безопаснее тупого — меньше соскальзывает.", "en": "Clean right after raw, do not leave them in the sink. A sharp knife is safer than a blunt one — it slips less."}}, {"h": {"ru": "Термометр в холодильнике", "en": "A fridge thermometer"}, "b": {"ru": "Встроенный датчик часто врёт. Отдельный термометр подтвердит 0–5 °C в холодильнике и −18 °C в морозилке.", "en": "Built-in displays often lie. A separate thermometer confirms 0–5°C in the fridge and −18°C in the freezer."}}, {"h": {"ru": "Контейнеры", "en": "Containers"}, "b": {"ru": "Берите герметичные, с местом для подписи даты. Прозрачные удобнее — видно содержимое. Менять при трещинах.", "en": "Choose airtight ones with room to date them. Clear is handy — you see the contents. Replace if cracked."}}, {"h": {"ru": "Чистка инвентаря", "en": "Cleaning tools"}, "b": {"ru": "Посудомойка при 60 °C+ хорошо дезинфицирует. Сушите на воздухе — полотенце может занести бактерии обратно.", "en": "A dishwasher at 60°C+ sanitises well. Air-dry items — a towel can put bacteria back."}}]]];
